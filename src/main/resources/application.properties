spring.application.name=quantity-measurement-app

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/quantity_db
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=dev
spring.datasource.password=dev

# JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# =============================================
# JWT SECRET KEY - SYMMETRIC (HS256)
# =============================================
jwt.secret=quantityMeasurementAppSecretKeyForOAuth2JWT2024LongEnough
jwt.expiration=86400000

# =============================================
# GOOGLE OAUTH2 CONFIGURATION
# =============================================
# Replace these with your actual Google credentials from:
# https://console.developers.google.com/
# Steps: Create Project -> Enable OAuth2 -> Create Credentials -> OAuth 2.0 Client IDs
# Authorized redirect URI: http://localhost:8080/login/oauth2/code/google
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =============================================
# FRONTEND REDIRECT AFTER GOOGLE LOGIN
# =============================================
# Where to redirect user after successful Google login (send JWT in URL param)
app.oauth2.success-redirect-url=${FRONTEND_CALLBACK_URL:http://127.0.0.1:5500/oauth2/callback.html}
logging.level.org.springframework.security=DEBUG


server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.http-only=true
